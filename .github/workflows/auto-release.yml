name: Auto Release

on:
  push:
    branches: [main]
  schedule:
    # Every 6 hours — catches direct pushes that may have bypassed the push event
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed for git describe
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest run

      - name: Check if HEAD is already tagged
        id: check
        run: |
          if git describe --exact-match HEAD 2>/dev/null; then
            echo "tagged=true" >> "$GITHUB_OUTPUT"
          else
            echo "tagged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version and push tag
        if: steps.check.outputs.tagged == 'false'
        run: |
          LATEST=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo 'v0.0.0')
          MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Latest tag: $LATEST — creating $NEW_TAG"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
