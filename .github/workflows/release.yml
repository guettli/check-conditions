name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -trimpath -o dist/check-conditions-linux-amd64   .
          GOOS=linux   GOARCH=arm64 go build -trimpath -o dist/check-conditions-linux-arm64   .
          GOOS=darwin  GOARCH=amd64 go build -trimpath -o dist/check-conditions-darwin-amd64  .
          GOOS=darwin  GOARCH=arm64 go build -trimpath -o dist/check-conditions-darwin-arm64  .
          GOOS=windows GOARCH=amd64 go build -trimpath -o dist/check-conditions-windows-amd64.exe .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
